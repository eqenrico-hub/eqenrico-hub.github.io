---
layout: default
title: PNG Cropper
---
<style>
  body { margin: 0; background: #121212; color: #eee; font-family: -apple-system, system-ui, sans-serif; }
  #app { position: fixed; inset: 0; z-index: 9999; background: #121212; display: grid; grid-template-columns: 260px 1fr; height: 100vh; }
  #sidebar { background: #1e1e1e; padding: 12px; overflow-y: auto; border-right: 1px solid #333; }
  h1 { font-size: 15px; margin: 0 0 10px 0; color: #ff6ec7; }
  label { display: block; font-size: 11px; margin: 4px 0 2px 0; color: #aaa; }
  button { background: #2a2a2a; color: #eee; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; margin: 2px; width: 100%; }
  button.primary { background: #3a2a4a; border-color: #5a4a6a; }
  button:hover { background: #3a3a3a; }
  .hint { font-size: 10px; color: #777; line-height: 1.4; margin: 6px 0; }
  .coords { font-family: monospace; font-size: 11px; color: #7fff9f; background: #0a1a0a; padding: 4px 6px; border-radius: 3px; }
  input[type=number] { background: #111; color: #eee; border: 1px solid #333; padding: 3px 5px; font-size: 11px; width: 70px; border-radius: 3px; }
  .row { display: flex; gap: 4px; align-items: center; margin: 4px 0; }
  #stage { position: relative; overflow: hidden; background: #000; }
  canvas { display: block; cursor: crosshair; }
</style>

<div id="app">
  <aside id="sidebar">
    <h1>PNG Cropper</h1>
    <div class="hint">Upload an image, drag a rectangle to select, download the crop at full native resolution.</div>
    <label>Source image</label>
    <input type="file" id="fileIn" accept="image/*" style="font-size:11px; width:100%;">
    <div id="srcSize" class="hint">—</div>
    <label>Crop coords (image px)</label>
    <div class="row"><label style="width:12px; margin:0;">x</label><input type="number" id="cx" value="0"><label style="width:12px; margin:0;">y</label><input type="number" id="cy" value="0"></div>
    <div class="row"><label style="width:12px; margin:0;">w</label><input type="number" id="cw" value="0"><label style="width:12px; margin:0;">h</label><input type="number" id="ch" value="0"></div>
    <div id="cropInfo" class="coords">drag on image →</div>
    <button id="btnDownload" class="primary">Download crop PNG</button>
    <button id="btnReset">Reset crop</button>
    <div class="hint">Drag a new box: clears the current crop first.<br>Hold <b>Shift</b> to move existing crop instead of redrawing.</div>
  </aside>
  <main id="stage">
    <canvas id="cv"></canvas>
  </main>
</div>

<script>
const stage = document.getElementById('stage');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let img = null;
let crop = null; // {x, y, w, h} in image coords
let drawing = false;
let start = null;
let moving = false;
let moveStart = null;

function fit() {
  if (!img) return { scale: 1, dx: 0, dy: 0 };
  const sw = stage.clientWidth, sh = stage.clientHeight;
  const s = Math.min(sw / img.naturalWidth, sh / img.naturalHeight);
  const dw = img.naturalWidth * s, dh = img.naturalHeight * s;
  const dx = (sw - dw) / 2, dy = (sh - dh) / 2;
  return { scale: s, dx, dy, dw, dh };
}

function render() {
  cv.width = stage.clientWidth;
  cv.height = stage.clientHeight;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, cv.width, cv.height);
  if (!img) return;
  const { scale, dx, dy, dw, dh } = fit();
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(img, dx, dy, dw, dh);
  if (crop) {
    // Dim outside
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, cv.width, cv.height);
    // Cut out the crop area
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillStyle = '#000';
    ctx.fillRect(dx + crop.x * scale, dy + crop.y * scale, crop.w * scale, crop.h * scale);
    ctx.globalCompositeOperation = 'source-over';
    // Re-draw the image inside the crop
    ctx.drawImage(img,
      crop.x, crop.y, crop.w, crop.h,
      dx + crop.x * scale, dy + crop.y * scale, crop.w * scale, crop.h * scale);
    // Outline
    ctx.strokeStyle = '#ff6ec7';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.strokeRect(dx + crop.x * scale, dy + crop.y * scale, crop.w * scale, crop.h * scale);
    ctx.setLineDash([]);
    updateInputs();
  } else {
    document.getElementById('cropInfo').textContent = 'drag on image →';
  }
}

function updateInputs() {
  if (!crop) return;
  document.getElementById('cx').value = Math.round(crop.x);
  document.getElementById('cy').value = Math.round(crop.y);
  document.getElementById('cw').value = Math.round(crop.w);
  document.getElementById('ch').value = Math.round(crop.h);
  document.getElementById('cropInfo').textContent = `x=${Math.round(crop.x)} y=${Math.round(crop.y)} w=${Math.round(crop.w)} h=${Math.round(crop.h)}`;
}

function screenToImage(sx, sy) {
  const { scale, dx, dy } = fit();
  return { x: (sx - dx) / scale, y: (sy - dy) / scale };
}

cv.addEventListener('mousedown', e => {
  if (!img) return;
  const rect = cv.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  if (e.shiftKey && crop) {
    moving = true;
    const p = screenToImage(sx, sy);
    moveStart = { mx: p.x, my: p.y, cx: crop.x, cy: crop.y };
  } else {
    drawing = true;
    start = screenToImage(sx, sy);
    crop = { x: start.x, y: start.y, w: 0, h: 0 };
  }
});

window.addEventListener('mousemove', e => {
  if (!img) return;
  const rect = cv.getBoundingClientRect();
  const sx = e.clientX - rect.left, sy = e.clientY - rect.top;
  if (drawing) {
    const p = screenToImage(sx, sy);
    const x1 = Math.max(0, Math.min(start.x, p.x));
    const y1 = Math.max(0, Math.min(start.y, p.y));
    const x2 = Math.min(img.naturalWidth, Math.max(start.x, p.x));
    const y2 = Math.min(img.naturalHeight, Math.max(start.y, p.y));
    crop = { x: x1, y: y1, w: x2 - x1, h: y2 - y1 };
    render();
  } else if (moving) {
    const p = screenToImage(sx, sy);
    crop.x = Math.max(0, Math.min(img.naturalWidth - crop.w, moveStart.cx + (p.x - moveStart.mx)));
    crop.y = Math.max(0, Math.min(img.naturalHeight - crop.h, moveStart.cy + (p.y - moveStart.my)));
    render();
  }
});

window.addEventListener('mouseup', () => { drawing = false; moving = false; });

document.getElementById('fileIn').addEventListener('change', e => {
  const f = e.target.files[0]; if (!f) return;
  const im = new Image();
  im.onload = () => {
    img = im;
    crop = null;
    document.getElementById('srcSize').textContent = `${im.naturalWidth}×${im.naturalHeight}`;
    render();
  };
  im.src = URL.createObjectURL(f);
});

['cx','cy','cw','ch'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    if (!img) return;
    crop = crop || { x: 0, y: 0, w: 0, h: 0 };
    crop.x = +document.getElementById('cx').value;
    crop.y = +document.getElementById('cy').value;
    crop.w = +document.getElementById('cw').value;
    crop.h = +document.getElementById('ch').value;
    render();
  });
});

document.getElementById('btnReset').addEventListener('click', () => { crop = null; render(); });

document.getElementById('btnDownload').addEventListener('click', () => {
  if (!img || !crop || crop.w < 2 || crop.h < 2) return;
  const out = document.createElement('canvas');
  out.width = Math.round(crop.w);
  out.height = Math.round(crop.h);
  out.getContext('2d').drawImage(img, crop.x, crop.y, crop.w, crop.h, 0, 0, out.width, out.height);
  out.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `crop_${Math.round(crop.x)}_${Math.round(crop.y)}_${Math.round(crop.w)}x${Math.round(crop.h)}.png`;
    a.click();
  });
});

window.addEventListener('resize', render);
render();
</script>
